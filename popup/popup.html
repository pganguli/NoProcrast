<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Noprocrast</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <header>
    <h1>Noprocrast</h1>
    <button id="settings-btn">Settings</button>
  </header>
  <main id="status-list">
    <p id="empty-msg">No sites configured.</p>
  </main>
  <footer>
    <div id="add-row">
      <input type="text" id="new-domain" placeholder="example.com" autocomplete="off" spellcheck="false">
      <button id="add-btn">Add</button>
    </div>
    <p id="add-error"></p>
  </footer>
  <script type="module" src="popup.js"></script>
</body>

</html>
