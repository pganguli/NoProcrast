<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NoProcrast Settings</title>
  <link rel="stylesheet" href="options.css">
</head>

<body>
  <main>
    <h1>NoProcrast Settings</h1>
    <div id="unlock-section" class="unlock-section">
      <label id="unlock-label" class="unlock-label" for="unlock-input"></label>
      <input type="text" id="unlock-input" class="unlock-input" maxlength="4"
        inputmode="numeric" autocomplete="off" aria-label="PIN to unlock settings">
      <span id="unlock-error" class="unlock-error" aria-live="polite"></span>
    </div>

    <section>
      <h2>Global Defaults</h2>
      <div class="field-row">
        <label for="global-maxvisit">Max visit (minutes)</label>
        <input type="number" id="global-maxvisit" min="1">
      </div>
      <div class="field-row">
        <label for="global-minaway">Min away (minutes)</label>
        <input type="number" id="global-minaway" min="1">
      </div>
      <span id="saved-msg" class="saved-msg" aria-live="polite"></span>
    </section>

    <section>
      <h2>Blocked Sites</h2>
      <table id="sites-table">
        <thead>
          <tr>
            <th scope="col">Domain</th>
            <th scope="col">Max Visit (min)</th>
            <th scope="col">Min Away (min)</th>
            <th scope="col"><span class="sr-only">Actions</span></th>
          </tr>
        </thead>
        <tbody id="sites-tbody"></tbody>
      </table>
      <div class="add-row">
        <input type="text" id="new-domain" placeholder="example.com" aria-label="Domain to add"
          autocomplete="off" spellcheck="false">
        <button id="add-btn">Add site</button>
        <span id="domain-error" class="error-msg" aria-live="polite"></span>
      </div>
    </section>
  </main>
  <script type="module" src="options.js"></script>
</body>

</html>
